<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="MeetSpace Admin Login — Secure dashboard access"/>
  <title>Admin Login — MeetSpace</title>

  <!-- Google Font: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

  <!-- External stylesheet -->
  <link rel="stylesheet" href="adminlogin.css"/>
</head>
<body>

  <!-- ══════════════════════════════════
       BACKGROUND DECORATIVE SHAPES
  ══════════════════════════════════ -->
  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- ══════════════════════════════════
       PAGE WRAPPER — centres the card
  ══════════════════════════════════ -->
  <main class="page-wrapper">

    <!-- ── Login Card ── -->
    <div class="login-card">

      <!-- Admin icon -->
      <div class="admin-icon" aria-hidden="true">
        <i class="ti ti-shield-lock"></i>
      </div>

      <!-- Heading -->
      <h1 class="card-title">Admin Login</h1>
      <p class="card-subtitle">Sign in to access the dashboard</p>

      <!-- ── Form ── -->
      <form class="login-form" action="#" method="post" novalidate>

        <!-- Email field -->
        <div class="field-group">
          <label class="field-label" for="email">Email Address</label>
          <div class="field-wrap">
            <i class="ti ti-mail field-icon" aria-hidden="true"></i>
            <input
              class="field-input"
              type="text"
              id="email"
              name="email"
              placeholder="admin@meetspace.co.ke"
              autocomplete="email"
            />
          </div>
          <div style="font-size:12px;color:#94A3B8;margin-top:6px;line-height:1.4">
            Use the seeded admin account: admin@meetspace.co.ke
          </div>
        </div>

        <!-- Password field -->
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-wrap">
            <i class="ti ti-lock field-icon" aria-hidden="true"></i>
            <input
              class="field-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button id="toggle-pw" class="toggle-password" type="button" aria-label="Show password" aria-pressed="false">
              <i id="eye-icon" class="ti ti-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <!-- Forgot password -->
        <div class="form-options">

          <a href="#" class="forgot-link">Forgot Password?</a>

        </div>

        <!-- Login button -->
        <button class="btn-login" type="submit">
          <i class="ti ti-login" aria-hidden="true"></i>
          Sign In
        </button>

      </form>
      <!-- end form -->

    </div>
    <!-- end login-card -->

  </main>

  <!-- ══════════════════════════════════
       FOOTER
  ══════════════════════════════════ -->
  <footer class="page-footer">
    <p>&copy; 2026 Admin Dashboard. All Rights Reserved.</p>
  </footer>

  <script src="config.js"></script>
  <script src="adminlogin.js"></script>
</body>
</html>
