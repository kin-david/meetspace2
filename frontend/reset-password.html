<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="./auth.css" />
</head>
<body>
  <main class="auth-shell">
    <h1>Reset Password</h1>
    <p class="helper">Choose a new strong password for your account.</p>

    <form id="resetForm">
      <label for="password">New password</label>
      <input id="password" name="password" type="password" required />
      <button type="submit">Reset password</button>
      <div id="message" class="notice"></div>
    </form>
  </main>
  <script>
    const API_BASE = 'http://localhost:5000/api/auth';
    const form = document.getElementById('resetForm');
    const message = document.getElementById('message');
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      message.className = 'error';
      message.textContent = 'Missing reset token. Request a new password reset link.';
      form.querySelector('button[type="submit"]').disabled = true;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.className = 'notice';
      message.textContent = 'Resetting password...';
      try {
        const response = await fetch(`${API_BASE}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: document.getElementById('password').value })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Reset failed');
        message.className = 'success';
        message.textContent = (data.message || 'Password reset successful.') + ' Redirecting to login...';
        setTimeout(() => {
          window.location.href = '../index.html';
        }, 1000);
      } catch (error) {
        message.className = 'error';
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
