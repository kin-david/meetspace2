services:
  - type: web
    name: meetspace-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DRIVER
        value: sqlite
      - key: DB_DISK_PATH
        value: /var/data
      - key: DB_NAME
        value: meetspace_db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CLIENT_URL
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
